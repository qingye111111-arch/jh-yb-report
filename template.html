<!DOCTYPE html><html lang="zh-CN"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>光大投标管家</title>
<style>*{margin:0;padding:0;box-sizing:border-box}body{font-family:"Microsoft YaHei","Segoe UI",sans-serif;background:#f0f2f5;color:#333;font-size:14px}
.top{background:linear-gradient(135deg,#1a5276,#2980b9);color:#fff;padding:16px 24px;display:flex;align-items:center;justify-content:space-between;flex-wrap:wrap;gap:10px}.top h1{font-size:18px;font-weight:600}.top .sub{font-size:12px;opacity:.8}
.container{max-width:1100px;margin:0 auto;padding:16px}
.summary-card{background:#fff;border-radius:8px;padding:16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08)}
.summary{font-size:13px;color:#555;margin-bottom:10px}.summary-stats{display:flex;gap:8px;flex-wrap:wrap}.stat{padding:6px 12px;border-radius:6px;font-size:12px}
.stat.green{background:#d4edda;color:#155724}.stat.yellow{background:#fff3cd;color:#856404}.stat.gray{background:#e2e3e5;color:#383d41}.stat.blue{background:#cce5ff;color:#004085}
.date-bar{background:#fff;border-radius:8px;padding:10px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);font-size:13px}.date-bar select{padding:5px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;background:#fff}
.search-bar{background:#fff;border-radius:8px;padding:12px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);display:flex;gap:8px;flex-wrap:wrap;align-items:center}
.search-bar input{flex:1;min-width:200px;padding:8px 12px;border:1px solid #ddd;border-radius:4px;font-size:13px;outline:none}.search-bar input:focus{border-color:#2980b9}.search-bar select{padding:8px 10px;border:1px solid #ddd;border-radius:4px;font-size:12px;background:#fff}
.tag-bar{display:flex;gap:4px;flex-wrap:wrap;margin-bottom:10px}
.tag{cursor:pointer;padding:4px 10px;border-radius:12px;font-size:11px;border:1px solid #b8d4f0;background:#e8f0fe;color:#1a5276;transition:.2s}.tag:hover{border-color:#2980b9;color:#2980b9}.tag.active{background:#2980b9;color:#fff;border-color:#2980b9}
.content-area{background:#fff;border-radius:8px;box-shadow:0 1px 3px rgba(0,0,0,.08);min-height:300px;padding:0}
.section{margin-bottom:10px}.section h2{padding:8px 14px;border-radius:4px;font-size:13px;margin-bottom:6px}
.green-hdr{background:#d4edda;color:#155724}.yellow-hdr{background:#fff3cd;color:#856404}
.item{border:1px solid #e8e8e8;border-radius:5px;padding:8px 12px;margin:0 12px 5px 12px}.item:hover{background:#f8f9fa}
.item .pid{color:#c0392b;font-family:Consolas,monospace;font-size:11px;font-weight:bold}.item .tit{color:#333;font-weight:600;font-size:13px}.item .detail{color:#666;font-size:12px;margin-top:2px;line-height:1.6}
.item .tags{margin-top:3px;display:flex;gap:4px;flex-wrap:wrap}.item .tags span{border-radius:3px;padding:1px 6px;font-size:10px}.tag-jh{background:#e8f0fe;color:#1a5276;border:1px solid #b8d4f0}.tag-type{background:#fff3cd;color:#856404;border:1px solid #ffe082}
.loading{text-align:center;padding:50px;color:#999;font-size:13px}.no-data{text-align:center;padding:40px;color:#999;font-size:13px}
.footer{text-align:center;padding:16px;color:#aaa;font-size:11px}@media(max-width:600px){.top{flex-direction:column;align-items:flex-start}}
</style></head><body>
<div class="top"><div><h1>🌾 光大投标管家</h1><div class="sub">光大环境项目智能筛选 | 每日凌晨自动更新</div></div></div>
<div class="container"><div class="summary-card"><div class="summary" id="summaryLine">加载中...</div><div class="summary-stats" id="summaryStats"></div></div>
<div class="date-bar">📅 按日期筛选：<select id="dateSelect" onchange="switchDate()"></select></div>
<div class="search-bar"><input type="text" id="searchInput" placeholder="🔍 搜索项目" oninput="filter()"><select id="typeFilter" onchange="filter()"><option value="all" selected>📋 全部可投</option><option value="core">✅ 推荐投标</option><option value="maybe">⚠️ 需核实</option><option value="no">❌ 其他</option></select><span style="font-size:11px;color:#999" id="resultCount"></span></div>
<div style="background:#fff;border-radius:8px;padding:10px 16px;margin-bottom:12px;box-shadow:0 1px 3px rgba(0,0,0,.08);text-align:center"><a href="javascript:void(0)" id="refreshBtn" onclick="doRefresh()" style="display:inline-block;background:#1a5276;color:#fff;text-decoration:none;padding:10px 30px;border-radius:6px;font-size:14px;font-weight:bold">⟳ 一键刷新数据</a>
<script>
function doRefresh(){var b=document.getElementById("refreshBtn");var t=b.textContent;b.textContent="⏳ 刷新中...";b.style.opacity="0.6";b.style.pointerEvents="none";fetch("/refresh").then(function(){setTimeout(function(){b.textContent="⟳ 一键刷新数据";b.style.opacity="1";b.style.pointerEvents="";alert("刷新已经启动，数据采集需要1-3分钟")},1500)}).catch(function(){b.textContent="⟳ 一键刷新数据";b.style.opacity="1";b.style.pointerEvents="";alert("启动失败，请重试")})}
</script><div style="font-size:11px;color:#999;margin-top:5px">每天凌晨 0 点自动更新</div></div>
<div class="tag-bar" id="tagBar"></div><div class="content-area" id="content"><div class="loading">加载中...</div></div></div>
<div class="footer">光大环境投标筛选工具</div>
<script>
var DATA=//__DATA__;var KWL=["热电偶","热电阻","温度计","双金属","温度变送器","压力表","压力变送器","差压变送器","压力开关","流量计","电磁流量计","涡街流量计","超声波流量计","液位计","液位变送器","磁翻板","雷达液位计","数显仪表","调节仪","显示仪","变送器","传感器","执行机构","电动执行器","调节阀","气动执行器","CEMS","烟气","气体检测","气体分析","分析仪","气体报警仪","氨逃逸","DCS","PLC","模块","控制器","PLC控制","DCS控制","可编程","卡件","安全阀","截止阀","球阀","蝶阀","闸阀","电磁阀","止回阀","减压阀","电仪","仪控","仪表","仪器","自动化","控制电缆","补偿导线","屏蔽电缆","开关柜","配电箱","变频器","软启动","称重","汽车衡","电子秤","PH计","溶解氧","浊度","水质分析","在线分析","检定","校验","校准","发电机","发电机组","电动机","变压器","汽轮机","风机","水泵","压缩机"];var LOADED={};var curDate='';var aT='';var sd='all';
function mJ(it){var t=(it.ti+' '+(it.bu||'')).toLowerCase();for(var i=0;i<KWL.length;i++)if(t.indexOf(KWL[i].toLowerCase())>=0)return true;return false}
function mT(it){var r=[],t=it.ti+' '+(it.bu||'');for(var i=0;i<KWL.length;i++)if(t.indexOf(KWL[i])>=0){r.push(KWL[i]);if(r.length>=4)break}return r}
function render(){var ai=[];if(DATA.core)DATA.core.forEach(function(it){it._type='core';ai.push(it)});if(DATA.maybe)DATA.maybe.forEach(function(it){it._type='maybe';ai.push(it)});if(DATA.no)DATA.no.forEach(function(it){it._type='no';ai.push(it)})
var jc=ai.filter(function(it){return mJ(it)}).length
document.getElementById('summaryLine').innerHTML='<strong>报告日期：'+DATA.date+'</strong> 共 '+DATA.total+' 条公告 | ✅ 推荐 '+DATA.cc+' | ⚠️ 核实 '+DATA.mc
document.getElementById('summaryStats').innerHTML='<span class="stat blue">📋 推荐投标 '+DATA.cc+' 项</span><span class="stat yellow">⚠️ 需核实 '+DATA.mc+' 项</span><span class="stat gray">❌ 不相关 '+DATA.nc+' 项</span>'
var counts={};ai.forEach(function(it){mT(it).forEach(function(t){counts[t]=(counts[t]||0)+1})})
var sorted=Object.keys(counts).sort(function(a,b){return counts[b]-counts[a]}),bar=document.getElementById('tagBar')
bar.innerHTML='<span class="tag active" data-tag="" onclick="tT(this)">🏷️ 全部</span>'
sorted.slice(0,18).forEach(function(k){bar.innerHTML+='<span class="tag" data-tag="'+k+'" onclick="tT(this)">'+k+' ('+counts[k]+')</span>'})
window.__ai=ai;window.__data=DATA;filter()}
function tT(el){var tag=el.getAttribute('data-tag');if(aT===tag){aT='';document.querySelectorAll('.tag').forEach(function(t){t.className='tag'});document.querySelector('.tag[data-tag=""]').className='tag active'}else{aT=tag;document.querySelectorAll('.tag').forEach(function(t){t.className='tag'});el.className='tag active'}filter()}
function filter(){var q=document.getElementById('searchInput').value.trim().toLowerCase(),tf=document.getElementById('typeFilter').value,ai=window.__ai;if(!ai)return
var fl=ai.filter(function(it){if(tf==='core'&&it._type!=='core')return false;if(tf==='maybe'&&it._type!=='maybe')return false;if(tf==='no'&&it._type!=='no')return false;if(tf==='high'&&!mJ(it))return false;if(aT&&mT(it).indexOf(aT)===-1)return false;if(sd!=='all'&&it.pt!==sd)return false;if(q&&(it.ti+' '+it.bu+' '+(it.pi||'')).toLowerCase().indexOf(q)===-1)return false;return true})
document.getElementById('resultCount').textContent='共 '+fl.length+' 项'
var c={};fl.forEach(function(it){mT(it).forEach(function(t){c[t]=(c[t]||0)+1})});var s=Object.keys(c).sort(function(a,b){return c[b]-c[a]});var bar=document.getElementById('tagBar');bar.innerHTML='<span class="tag active" data-tag="" onclick="tT(this)">🏷️ \u5168\u90e8</span>';s.slice(0,18).forEach(function(k){bar.innerHTML+='<span class="tag" data-tag="'+k+'" onclick="tT(this)">'+k+' ('+c[k]+')</span>'});
var co=fl.filter(function(it){return it._type==='core'}),mb=fl.filter(function(it){return it._type==='maybe'}),nf=fl.filter(function(it){return it._type==='no'}),h='';if(co.length>0){h+='<div class="section"><h2 class="green-hdr">✅ 推荐投标 ('+co.length+'项)</h2>';co.forEach(function(it){h+=rI(it)});h+='</div>'}if(mb.length>0){h+='<div class="section"><h2 class="yellow-hdr">⚠️ 需核实 ('+mb.length+'项)</h2>';mb.forEach(function(it){h+=rI(it)});h+='</div>'}if(nf.length>0){h+='<div class="section"><h2 style="background:#e2e3e5;color:#383d41;padding:8px 14px;border-radius:4px;font-size:13px;margin-bottom:6px">❌ 其他 ('+nf.length+'项)</h2>';nf.forEach(function(it){h+=rI(it)});h+='</div>'}
document.getElementById('content').innerHTML=h||'<div class="no-data">没有匹配的项目</div>'}
function recalcTags(){var ai=(window.__data.core||[]).map(function(it){it._type='core';return it}).concat((window.__data.maybe||[]).map(function(it){it._type='maybe';return it})).concat((window.__data.no||[]).map(function(it){it._type='no';return it}));if(sd!=='all')ai=ai.filter(function(it){return it.pt===sd});var c={};ai.forEach(function(it){mT(it).forEach(function(t){c[t]=(c[t]||0)+1})});var s=Object.keys(c).sort(function(a,b){return c[b]-c[a]}),bar=document.getElementById('tagBar');bar.innerHTML='<span class="tag active" data-tag="" onclick="tT(this)">🏷️ 全部</span>';s.slice(0,18).forEach(function(k){bar.innerHTML+='<span class="tag" data-tag="'+k+'" onclick="tT(this)">'+k+' ('+c[k]+')</span>'});window.__ai=ai;window.__data._cnt=c}
function rI(it){var info='🏢 '+(it.bu||'')+(it.co?' · 👤 '+it.co:'')+(it.ph?' · 📞 '+it.ph:'')+(it.pt?' · 📅 '+it.pt:'')+(it.dl?' · ⏰ 截止：'+it.dl:'')
var tags=mT(it),th='';if(tags.length>0||mJ(it)){th='<div class="tags">';tags.forEach(function(t){th+='<span class="tag-type">'+t+'</span>'});th+='</div>'}
var pl='';if(it.pf){pl=' · <a href="附件/'+it.pf+'" target="_blank" style="color:#2980b9;text-decoration:none;font-size:12px;background:#e8f0fe;padding:2px 6px;border-radius:3px">📎 PDF</a>'}
return '<div class="item"><div><span class="pid" style="cursor:pointer" data-pid="'+(it.pi||'')+'" title="点击复制编号">['+(it.pi||'')+']</span> <span class="tit">'+it.ti+'</span></div><div class="detail">'+info+pl+'</div>'+th+'</div>'}
function copyPID(p){navigator.clipboard.writeText(p).catch(function(){prompt('复制编号:',p)})}document.addEventListener('click',function(e){var p=e.target.getAttribute('data-pid');if(p){navigator.clipboard.writeText(p).catch(function(){prompt('复制编号:',p)})}});document.addEventListener('click',function(e){var p=e.target.getAttribute('data-pid');if(p){navigator.clipboard.writeText(p).catch(function(){prompt('复制编号:',p)})}});function switchDate(){sd=document.getElementById('dateSelect').value;recalcTags();filter();}
function init(){LOADED[DATA.date]=DATA;render();var sel=document.getElementById('dateSelect');sel.innerHTML='<option value="all">📅 全部日期</option>';var dt=[];if(DATA.core)DATA.core.forEach(function(it){if(it.pt&&dt.indexOf(it.pt)===-1)dt.push(it.pt)});if(DATA.maybe)DATA.maybe.forEach(function(it){if(it.pt&&dt.indexOf(it.pt)===-1)dt.push(it.pt)});dt.sort().reverse();dt.forEach(function(d){var o=document.createElement('option');o.value=d;o.textContent=d;sel.appendChild(o)});sel.value=DATA.date;sd=DATA.date;filter()}
init();
</script></body></html>
